apiVersion: apps/v1
kind: Deployment
metadata:
  name: ficmart-deployment
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ficmart
  template:
    metadata:
      labels:
        app: kubia
    spec:
      containers:
        - name: ficmart
          image: nehecodes/ficmart
          ports:
            containerPort: 8000
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            